 <div style="

  <script src="/_sdk/b19ec5e9a6bcccbf.editing_sdk.js" integrity="sha512-zBJgQuXCQdyGFqXgZwfp8p9NowwbyuWhOK/NGHf9nps+IMSAyeeSyv3qhtfcnKWA9sWownxUevRqEhsjnjL55w=="></script>
  <script>
        const questions = [
            { q: "System EZD RP wspiera cyfryzację administracji.", a: true },
            { q: "W EZD RP można prowadzić tylko sprawy w postaci elektronicznej.", a: false },
            { q: "Każdy dokument elektroniczny wymaga własnoręcznego podpisu.", a: false },
            { q: "Elektroniczny obieg dokumentów przyspiesza załatwianie spraw.", a: true },
            { q: "EZD RP pomaga śledzić historię obiegu dokumentów.", a: true },
            { q: "Sprawa w EZD RP może zawierać maksymalnie 20 dokumentów.", a: false },
            { q: "EZD RP pozwala wyszukiwać dokumenty w papierowych teczkach.", a: false },
            { q: "Metadane dokumentu pomagają w jego wyszukiwaniu i identyfikacji.", a: true },
            { q: "W EZD RP można tworzyć projekty pism urzędowych.", a: true },
            { q: "Jeden dokument elektroniczny może obsługiwać tylko jedna wyznaczona osoba.", a: false },
            { q: "EZD RP pozwala sprawdzić, na jakim etapie jest realizacja sprawy.", a: true },
            { q: "W EZD RP można swobodnie usuwać dokumenty.", a: false },
            { q: "Użytkownik dodany do EZD RP może mieć tylko jedno stanowisko w systemie.", a: false },
            { q: "KPO wspiera rozwój usług cyfrowych.", a: true },
            { q: "Dokument elektroniczny zawsze trzeba wydrukować.", a: false },
            { q: "EZD RP może pomóc zmniejszyć zużycie papieru.", a: true }
        ];

        let current = [], idx = 0, score = 0, waiting = false;

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            current = shuffle([...questions]).slice(0, 8);
            idx = 0; score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            document.getElementById('question-screen').classList.add('fade-in');
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('question-text').textContent = current[idx].q;
            document.getElementById('counter').textContent = `Pytanie ${idx + 1} / 8`;
            document.getElementById('score-display').textContent = `Wynik: ${score}/${idx}`;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').style.color = '';
            waiting = false;
        }

        function answer(val) {
            if (waiting) return;
            waiting = true;
            const correct = val === current[idx].a;
            if (correct) score++;
            const fb = document.getElementById('feedback');
            fb.textContent = correct ? '✓ Dobrze!' : '✗ Źle!';
            fb.style.color = correct ? '#68d391' : '#fc8181';
            setTimeout(() => {
                idx++;
                if (idx < 8) { showQuestion(); }
                else { showResult(); }
            }, 1000);
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('fade-in');
            document.getElementById('result-score').textContent = `${score} / 8`;
            document.getElementById('result-detail').textContent = score >= 7 ? 'Świetny wynik!' : score >= 5 ? 'Dobra robota!' : 'Spróbuj ponownie!';
        }
    </script>
